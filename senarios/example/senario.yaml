apiVersion: v1
kind: Namespace
metadata:
  name: test-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-api
  namespace: test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-api
  template:
    metadata:
      labels:
        app: test-api
    spec:
      containers:
        - name: test-server
          image: clue/json-server
          args: ["--watch", "/data/db.json", "--host", "::"]
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          configMap:
            name: test-api-json-data
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-api-json-data
  namespace: test-app
data:
  db.json: |
    {
      "posts": [
        { "id": 1, "title": "hello", "body": "world" },
        { "id": 2, "title": "kube", "body": "test api" }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: test-api
  namespace: test-app
spec:
  selector:
    app: test-api
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-ui
  namespace: test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-ui
  template:
    metadata:
      labels:
        app: test-ui
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: html
          configMap:
            name: ui-html
        - name: nginx-conf
          configMap:
            name: ui-nginx-conf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ui-html
  namespace: test-app
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <body>
      <h1>Test UI</h1>
      <button onclick="loadData()">Fetch API</button>
      <pre id="output"></pre>

      <script>
        function loadData() {
          fetch('/api/posts')
            .then(res => res.json())
            .then(data => {
              document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            });
        }
      </script>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ui-nginx-conf
  namespace: test-app
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass http://test-api:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: test-ui
  namespace: test-app
spec:
  type: NodePort
  selector:
    app: test-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-ingress
  namespace: test-app
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: test-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-ui
                port:
                  number: 80
